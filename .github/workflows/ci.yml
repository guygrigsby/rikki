name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # the full gate: py goldens are skipped without RIKKI_TEST_PY
      - run: RIKKI_TEST_PY=1 cargo test

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: seed corpus from the goldens
        run: |
          mkdir -p fuzz/corpus/parse_check
          find tests/golden -name '*.rk' -exec cp {} fuzz/corpus/parse_check/ \;
      # explicit gnu target: the prebuilt cargo-fuzz binary is musl-linked
      # and would otherwise default to a musl build target, which ASan rejects
      - run: cargo fuzz run parse_check --target x86_64-unknown-linux-gnu -- -max_total_time=60
