name: release

on:
  push:
    tags: ["v*"]

# every wheel gets libpython grafted in by packaging/repair-wheel.py: the
# build links an absolute libpython path that only exists on the build
# machine, so the binaries ship their own copy (loaded via
# @executable_path/../lib on mac, $ORIGIN/../lib on linux)
jobs:
  wheels-linux:
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # hostedtoolcache pythons carry the shared libpython the link needs,
      # and a host rust toolchain keeps maturin-action building natively
      # (its cross path generates a pyo3 config with no libpython lib_dir)
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist -i python${{ matrix.python }}
      - uses: astral-sh/setup-uv@v6
      - name: graft libpython
        run: |
          uv python install ${{ matrix.python }}
          P=$(uv python find ${{ matrix.python }})
          LIBDIR=$(dirname "$P")/../lib
          uvx --with wheel --with patchelf python packaging/repair-wheel.py \
            dist/*.whl "$LIBDIR/libpython${{ matrix.python }}.so.1.0"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-py${{ matrix.python }}
          path: dist

  wheels-macos:
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v6
      - name: build against a uv-managed python
        run: |
          uv python install ${{ matrix.python }}
          uvx maturin build --release --out dist -i "$(uv python find ${{ matrix.python }})"
      - name: graft libpython
        run: |
          P=$(uv python find ${{ matrix.python }})
          LIBDIR=$(dirname "$P")/../lib
          uvx --with wheel python packaging/repair-wheel.py \
            dist/*.whl "$LIBDIR/libpython${{ matrix.python }}.dylib"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-py${{ matrix.python }}
          path: dist

  # keeps the homebrew tap's formula version in step with the release; the
  # "tap" environment holds ENABLE_TAP_BUMP and TAP_PUSH_TOKEN (fine-grained
  # PAT, Contents read/write on guygrigsby/homebrew-tap only)
  tap:
    needs: publish
    environment: tap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: bump formula version
        env:
          GH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
          ENABLED: ${{ vars.ENABLE_TAP_BUMP }}
        run: |
          if [ "$ENABLED" != "true" ] || [ -z "$GH_TOKEN" ]; then
            echo "tap bump disabled or no token; skipping"
            exit 0
          fi
          ver="${GITHUB_REF_NAME#v}"
          gh auth setup-git
          gh repo clone guygrigsby/homebrew-tap
          cd homebrew-tap
          sed -i -E "s/version \"[0-9][0-9.]*\"/version \"$ver\"/" Formula/rikki.rb
          if git diff --quiet; then
            echo "formula already at $ver"
            exit 0
          fi
          git config user.name "rikki-release"
          git config user.email "guy@grigsby.dev"
          git commit -am "rikki $ver"
          git push

  publish:
    needs: [wheels-linux, wheels-macos]
    runs-on: ubuntu-latest
    # PyPI trusted publishing: register this repo + workflow on pypi.org,
    # no token secret needed
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
