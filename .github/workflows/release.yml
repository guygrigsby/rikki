name: release

on:
  push:
    tags: ["v*"]

jobs:
  wheels:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist -i python${{ matrix.python }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python }}
          path: dist

  # keeps the homebrew tap's formula version in step with the release;
  # needs the ENABLE_TAP_BUMP repo variable set to "true" and a
  # TAP_PUSH_TOKEN secret that can push to guygrigsby/homebrew-tap
  tap:
    needs: publish
    if: vars.ENABLE_TAP_BUMP == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: bump formula version
        env:
          GH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          gh repo clone guygrigsby/homebrew-tap
          cd homebrew-tap
          sed -i -E "s/version \"[0-9][0-9.]*\"/version \"$ver\"/" Formula/rikki.rb
          git config user.name "rikki-release"
          git config user.email "guy@grigsby.dev"
          git commit -am "rikki $ver"
          git push

  publish:
    needs: wheels
    runs-on: ubuntu-latest
    # PyPI trusted publishing: register this repo + workflow on pypi.org,
    # no token secret needed
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
