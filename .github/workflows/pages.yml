name: pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: playground
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack,mdbook
      - name: build the playground
        run: |
          cd playground
          wasm-pack build --target web --release
          mkdir -p ../dist/pkg
          cp site/index.html site/style.css site/main.js ../dist/
          cp pkg/rikki_playground.js pkg/rikki_playground_bg.wasm ../dist/pkg/
          cp ../art/logo.png ../dist/
          python3 ../docs/book/gen-reference.py
          mdbook build ../docs/book -d "$(pwd)/../dist/book"
          # cache-bust every asset chain with the commit: Pages caches for
          # ten minutes and a fresh html over stale css shears the layout
          v="${GITHUB_SHA::8}"
          sed -i "s|style.css|style.css?v=$v|; s|main.js|main.js?v=$v|" ../dist/index.html
          sed -i "s|./pkg/rikki_playground.js|./pkg/rikki_playground.js?v=$v|" ../dist/main.js
          sed -i "s|rikki_playground_bg.wasm|rikki_playground_bg.wasm?v=$v|" ../dist/pkg/rikki_playground.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
