name: pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: playground
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack,mdbook
      - name: build the site
        run: |
          # nevla.dev, go.dev-shaped: / is a landing page, /play the
          # playground, /doc the book, /ref/spec the rendered spec.
          # The book's preprocessor and reference generator are nevla
          # programs; build the runner first.
          cargo build --bin nv
          mkdir -p dist/play/pkg
          cp site/index.html dist/
          cp art/logo.png dist/
          cd playground
          wasm-pack build --target web --release
          cp site/index.html site/style.css site/main.js ../dist/play/
          cp pkg/nevla_playground.js pkg/nevla_playground_bg.wasm ../dist/play/pkg/
          cp ../art/logo.png ../dist/play/
          cd ..
          ./target/debug/nv docs/book/gen-reference.nv
          mdbook build docs/book -d "$(pwd)/dist/doc"
          mdbook build docs/ref -d "$(pwd)/dist/ref/spec"
          # cache-bust every asset chain with the commit: Pages caches for
          # ten minutes and a fresh html over stale css shears the layout
          v="${GITHUB_SHA::8}"
          sed -i "s|style.css|style.css?v=$v|; s|main.js|main.js?v=$v|" dist/play/index.html
          sed -i "s|./pkg/nevla_playground.js|./pkg/nevla_playground.js?v=$v|" dist/play/main.js
          sed -i "s|nevla_playground_bg.wasm|nevla_playground_bg.wasm?v=$v|" dist/play/pkg/nevla_playground.js
          # the ref book links the shared theme css unhashed (mdBook only
          # hashes additional-css living inside the book); bust it too or
          # the spec wears last deploy's styles for ten minutes
          find dist/ref/spec -name '*.html' -exec sed -i "s|book/theme/nevla.css|book/theme/nevla.css?v=$v|g" {} +
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
