name: pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: playground
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: build the playground
        run: |
          cd playground
          wasm-pack build --target web --release
          mkdir -p ../dist/pkg
          cp site/index.html site/style.css site/main.js ../dist/
          cp pkg/rikki_playground.js pkg/rikki_playground_bg.wasm ../dist/pkg/
          cp ../art/logo.png ../dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
