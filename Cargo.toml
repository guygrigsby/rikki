[package]
name = "rikki"
version = "0.1.11"
edition = "2021"
license = "MIT"
description = "Interpreted language with Go's discipline and CPython's ecosystem"

[dependencies]
clap = { version = "4", features = ["derive"] }
indexmap = "2"
toml = "1.1.2"

# native-only: the py bridge, http, and SIGINT handling have no wasm story;
# the playground build stubs them (src/bridge_wasm.rs, cfg gates)
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
ctrlc = "3.5.2"
pyo3 = { version = "0.29.0", features = ["py-clone"] }
ureq = "3.3.0"

[[bin]]
name = "rikki"
path = "src/main.rs"
