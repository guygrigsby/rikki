[package]
name = "mongoose"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Interpreted language with Go's discipline and CPython's ecosystem"

[dependencies]
clap = { version = "4", features = ["derive"] }
ctrlc = "3.5.2"
indexmap = "2"
ureq = "3.3.0"

[[bin]]
name = "mongoose"
path = "src/main.rs"
